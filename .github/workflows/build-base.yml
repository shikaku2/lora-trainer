name: Build Base Image

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile.base"
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show disk usage after cleanup
        run: df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lora-trainer-base:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/lora-trainer-base:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/lora-trainer-base:buildcache,mode=max
          provenance: false
          sbom: false
